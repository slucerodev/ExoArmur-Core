name: Standalone Demo Smoke Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  standalone-demo-smoke:
    runs-on: ubuntu-latest
    name: Standalone Governance Demo Smoke
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12.3'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip==24.0
        python -m pip install -r requirements.lock
        python -m pip install --no-deps -e .
        
    - name: Run Standalone Demo Proof
      run: |
        python3 examples/demo_standalone.py > demo_output.txt 2>&1
        cat demo_output.txt

        grep -q "Execution boundary result: policy denied before any filesystem side effect" demo_output.txt || { echo "❌ Missing execution boundary marker"; exit 1; }
        grep -q "Proof bundle written: examples/demo_standalone_proof_bundle.json" demo_output.txt || { echo "❌ Missing proof bundle marker"; exit 1; }
        grep -q "DEMO_RESULT=DENIED" demo_output.txt || { echo "❌ Missing DEMO_RESULT=DENIED"; exit 1; }
        grep -q "ACTION_EXECUTED=false" demo_output.txt || { echo "❌ Missing ACTION_EXECUTED=false"; exit 1; }
        grep -q "AUDIT_STREAM_ID=demo-standalone-delete-outside-authorized-path" demo_output.txt || { echo "❌ Missing AUDIT_STREAM_ID"; exit 1; }

        echo "✅ Standalone demo markers verified"
        
    - name: Run Standalone Demo Tests
      run: |
        python3 -m pytest tests/test_demo_standalone.py -v
        
    - name: Upload demo artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: standalone-demo-output
        path: |
          demo_output.txt
          examples/demo_standalone_proof_bundle.json
        retention-days: 7
