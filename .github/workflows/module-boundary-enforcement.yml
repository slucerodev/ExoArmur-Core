name: ExoArmur Module Boundary Enforcement

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  module-boundary-check:
    runs-on: ubuntu-latest
    name: Module Boundary Gate (Hard Fail)
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.3'

      - name: Gate — Module Boundary Enforcement
        run: python3 tools/boundary_check.py
