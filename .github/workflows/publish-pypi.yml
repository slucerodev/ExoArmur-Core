name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  verify:
    name: Verify & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade "pip>=26.0"
          python -m pip install -r requirements.lock
          python -m pip install --no-deps -e .

      - name: Check tag matches pyproject.toml version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          TOML_VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "//; s/"//')
          if [ "$TAG" != "$TOML_VERSION" ]; then
            echo "❌ Tag $TAG does not match pyproject.toml version $TOML_VERSION"
            exit 1
          fi
          echo "✅ Version $TAG verified"

      - name: Run test suite
        run: python -m pytest -q --tb=short

  build:
    name: Build Distribution
    runs-on: ubuntu-latest
    needs: verify
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12.3'

      - name: Install build tools
        run: python -m pip install --upgrade build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Get version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
