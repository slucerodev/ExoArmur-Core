name: Security Scan

on:
  pull_request:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        
    - name: Install dependencies
      run: |
        python -m pip install -U "pip==24.0"
        python -m pip install -c constraints.txt -e .
        python -m pip install pip-audit
        python -m pip install bandit
        
    - name: Install gitleaks
      run: |
        GITLEAKS_DIR="$(mktemp -d)"
        TARBALL="$GITLEAKS_DIR/gitleaks_8.18.2_linux_x64.tar.gz"
        CHECKSUMS="$GITLEAKS_DIR/gitleaks_8.18.2_checksums.txt"
        wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_linux_x64.tar.gz -O "$TARBALL"
        wget https://github.com/gitleaks/gitleaks/releases/download/v8.18.2/gitleaks_8.18.2_checksums.txt -O "$CHECKSUMS"
        EXPECTED_SHA256="$(grep ' gitleaks_8.18.2_linux_x64.tar.gz$' "$CHECKSUMS" | awk '{print $1}')"
        echo "${EXPECTED_SHA256}  ${TARBALL}" | sha256sum --check --status
        tar -xzf "$TARBALL" -C "$GITLEAKS_DIR" gitleaks
        echo "GITLEAKS_DIR=$GITLEAKS_DIR" >> "$GITHUB_ENV"
        "$GITLEAKS_DIR/gitleaks" version
        test ! -f README.md || true
        ls -la "$GITLEAKS_DIR"
        
    - name: Run dependency audit
      run: pip-audit -r requirements.txt --ignore-vuln CVE-2025-8869
      continue-on-error: false
      
    - name: Run SAST (bandit)
      run: bandit -r src -f json -o bandit-report.json || true
      continue-on-error: false
      
    - name: Check bandit results
      run: |
        if [ -f bandit-report.json ]; then
        python - <<'PY'
        import json
        from pathlib import Path
        
        report = json.loads(Path("bandit-report.json").read_text())
        results = report.get("results", [])
        relevant = [
            {
                "file": result.get("filename"),
                "issue": result.get("issue_text"),
                "severity": result.get("severity"),
            }
            for result in results
            if result.get("severity") in {"HIGH", "MEDIUM"}
        ]
        
        if relevant:
            print("FAIL: High or Medium severity issues found")
            for item in relevant:
                print(json.dumps(item, sort_keys=True))
            raise SystemExit(1)
        PY
        fi
        
    - name: Run secret scan (gitleaks)
      run: |
        set +e
        "$GITLEAKS_DIR/gitleaks" detect --no-git --redact --config .gitleaks.toml --report-format json --report-path gitleaks-report.json
        status=$?
        cat gitleaks-report.json
        exit $status
      continue-on-error: false