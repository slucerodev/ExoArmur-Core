name: ExoArmur Core Invariant Gates

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  core-invariants:
    runs-on: ubuntu-latest
    name: Core Invariant Gates (Fail-Fast)
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Gate 0 — No untracked under src/exoarmur
        run: bash scripts/governance/guard_untracked_src_exoarmur.sh

      - name: Set up Python 3.12.3
        uses: actions/setup-python@v6
        with:
          python-version: '3.12.3'

      - name: Gate 1 — Deterministic Environment Setup (Pinned Python + Clean Install)
        run: |
          python3 -m pip install --upgrade pip -c constraints.txt
          python3 -m pip install -c constraints.txt .

      - name: Gate 1a — Packaging smoke (install + CLI + quickstart)
        run: |
          python -m pip install .
          exoarmur --help | head -30
          python examples/quickstart_replay.py

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest pytest-asyncio

      - name: Provide docker-compose (shim to docker compose v2)
        run: |
          set -euo pipefail
          docker --version
          docker compose version
          sudo tee /usr/local/bin/docker-compose >/dev/null <<'SH'
          #!/usr/bin/env bash
          set -euo pipefail
          exec docker compose "$@"
          SH
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose --version

      - name: Gate 2 — Test Execution (python3 -m pytest -q)
        run: |
          echo "=== BEFORE PYTEST ==="
          git status --porcelain || true
          python3 -m pytest -q
          echo "=== AFTER PYTEST ==="
          git status --porcelain || true

      - name: Snapshot diagnostics on failure
        if: failure()
        run: |
          python scripts/export_openapi_and_schemas.py || true
          git status --porcelain=v1 || true
          git diff || true

      - name: Gate 3 — Explicit Invariant Gate (Boundary Enforcement)
        run: |
          echo "=== BEFORE BOUNDARY GATE ==="
          git status --porcelain || true
          python3 scripts/boundary_gate.py
          echo "=== AFTER BOUNDARY GATE ==="
          git status --porcelain || true

      - name: Gate 4 — Repo Cleanliness (No Generated Diffs)
        run: |
          echo "=== BEFORE CLEANLINESS CHECK ==="
          git status --porcelain
          git rev-parse HEAD
          echo "=== RUNNING CLEANLINESS CHECK ==="
          git status --porcelain
          test -z "$(git status --porcelain)"
      
      - name: Cleanliness Failure Diagnostics
        if: failure()
        run: |
          echo "=== CLEANLINESS FAILURE DIAGNOSTICS ==="
          echo "=== AFTER PREVIOUS STEPS ==="
          git status --porcelain
          echo "=== FILE DRIFT DETECTED ==="
          git diff --name-status || true
          echo "=== FULL DIFF OF CHANGES ==="
          git diff || true
