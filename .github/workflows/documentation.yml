name: Documentation Build and Deploy

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'examples/**'
      - 'pyproject.toml'
  pull_request:
    branches: [ main ]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'examples/**'
      - 'pyproject.toml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.3'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade "pip>=26.0"
        python -m pip install -r requirements.lock
        python -m pip install --no-deps -e .

    - name: Verify locked environment
      run: |
        python scripts/infra/verify_env_parity.py \
          --expected-python-version 3.12.3 \
          --expected-platform Linux

    - name: Generate API docs
      run: |
        mkdir -p docs/api
        sphinx-apidoc -o docs/api src/exoarmur --force --module-first

    - name: Build documentation
      run: |
        cd docs
        make html

    - name: Check documentation build
      run: |
        if [ ! -f docs/_build/html/index.html ]; then
          echo "Documentation build failed"
          exit 1
        fi

    - name: Upload documentation artifacts
      uses: actions/upload-artifact@v4
      with:
        name: documentation
        path: docs/_build/html/
        retention-days: 7

  validate-examples:
    name: Validate Examples
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v4
      with:
        python-version: '3.12.3'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade "pip>=26.0"
        python -m pip install -r requirements.lock
        python -m pip install --no-deps -e .

    - name: Verify locked environment
      run: |
        python scripts/infra/verify_env_parity.py \
          --expected-python-version 3.12.3 \
          --expected-platform Linux

    - name: Test quickstart examples
      run: |
        # Test quickstart replay example
        python examples/quickstart_replay.py || echo "Quickstart example not yet implemented"

    - name: Test demo scripts
      run: |
        # Test standalone governance demo
        python examples/demo_standalone.py || echo "Demo script needs environment setup"

    - name: Validate example syntax
      run: |
        find examples -name "*.py" -exec python -m py_compile {} \;
        find scripts -name "*.py" -exec python -m py_compile {} \;

  check-links:
    name: Check Documentation Links
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check README links
      run: |
        python scripts/infra/check_markdown_links.py README.md

    - name: Check documentation links
      run: |
        python scripts/infra/check_markdown_links.py docs

  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    needs: [build-docs, validate-examples, check-links]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Download documentation artifacts
      uses: actions/download-artifact@v4
      with:
        name: documentation
        path: docs/_build/html/

    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./docs/_build/html
        destination_dir: docs

    - name: Create documentation summary
      run: |
        echo "## 📚 Documentation Deployed Successfully" >> $GITHUB_STEP_SUMMARY
        echo "- **URL**: https://slucerodev.github.io/ExoArmur-Core/docs/" >> $GITHUB_STEP_SUMMARY
        echo "- **Version**: Latest from main branch" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: Production documentation" >> $GITHUB_STEP_SUMMARY