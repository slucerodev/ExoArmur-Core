name: ExoArmur Phase 0D Boundary Enforcement

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read
  actions: read

jobs:
  boundary-gate:
    runs-on: ubuntu-latest
    name: Boundary Gate (Determinism + Fixture Scopes)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12.3'
    
    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.lock') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip==24.0
        python -m pip install -r requirements.lock
        python -m pip install --no-deps -e ".[v2]"
    
    - name: Run Boundary Gate
      run: |
        python scripts/boundary_gate.py
    
    - name: Upload boundary gate results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: boundary-gate-results
        path: |
          /tmp/test_report.json
          boundary-gate.log

  protocol-enforcer-boundary:
    runs-on: ubuntu-latest
    name: Protocol Enforcer Boundary Check
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12.3'
    
    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.lock') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip==24.0
        python -m pip install -r requirements.lock
        python -m pip install --no-deps -e .
    
    - name: Run Protocol Enforcer Boundary Check
      run: |
        python scripts/protocol_enforcer_boundary.py
    
    - name: Upload protocol enforcer results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: protocol-enforcer-results
        path: protocol-enforcer.log

  test-collection-stability:
    runs-on: ubuntu-latest
    name: Test Collection Stability
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12.3'
    
    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.lock') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip==24.0
        python -m pip install -r requirements.lock
        python -m pip install --no-deps -e .

    - name: Check test collection count
      run: |
        echo "Checking test collection stability..."
        python -m pytest --collect-only -vv
        SUMMARY=$(python -m pytest --collect-only -q 2>/dev/null | tail -1 || true)
        echo "Summary: $SUMMARY"
        
        if [[ "$SUMMARY" != *"685 tests collected"* ]]; then
          echo "❌ Test collection count changed from expected 685"
          echo "   Expected: 685 tests collected"
          echo "   Actual: $SUMMARY"
          exit 1
        fi
        
        echo "✅ Test collection count stable: 685 tests"

  full-test-suite:
    runs-on: ubuntu-latest
    name: Full Test Suite (Optional)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12.3'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip==24.0
        python -m pip install -r requirements.lock
        python -m pip install --no-deps -e .

    - name: Provide docker-compose (shim to docker compose v2)
      run: |
        set -euo pipefail
        docker --version
        docker compose version
        sudo tee /usr/local/bin/docker-compose >/dev/null <<'SH'
        #!/usr/bin/env bash
        set -euo pipefail
        exec docker compose "$@"
        SH
        sudo chmod +x /usr/local/bin/docker-compose
        docker-compose --version

    - name: Run full test suite
      run: |
        echo "Running full test suite..."
        python -m pytest tests/ --tb=short --junitxml=test-results.xml
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: full-test-results
        path: test-results.xml
