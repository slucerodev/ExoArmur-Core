name: ExoArmur Phase 0D Boundary Enforcement

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  boundary-gate:
    runs-on: ubuntu-latest
    name: Boundary Gate (Determinism + Fixture Scopes)
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip -c constraints.txt
        python -m pip install -r requirements.txt
        pip install -e ".[v2]"
    
    - name: Run Boundary Gate
      run: |
        python scripts/boundary_gate.py
    
    - name: Upload boundary gate results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: boundary-gate-results
        path: |
          /tmp/test_report.json
          boundary-gate.log

  protocol-enforcer-boundary:
    runs-on: ubuntu-latest
    name: Protocol Enforcer Boundary Check
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip -c constraints.txt
        python -m pip install -r requirements.txt
        pip install -e .
    
    - name: Run Protocol Enforcer Boundary Check
      run: |
        python scripts/protocol_enforcer_boundary.py
    
    - name: Upload protocol enforcer results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: protocol-enforcer-results
        path: protocol-enforcer.log

  test-collection-stability:
    runs-on: ubuntu-latest
    name: Test Collection Stability
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip -c constraints.txt
        python -m pip install -r requirements.txt
        pip install -e .

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest pytest-asyncio

    - name: Check test collection count
      run: |
        echo "Checking test collection stability..."
        python -m pytest --collect-only -vv
        SUMMARY=$(python -m pytest --collect-only -q 2>/dev/null | tail -1 || true)
        echo "Summary: $SUMMARY"
        
        if [[ "$SUMMARY" != *"612 tests collected"* ]]; then
          echo "❌ Test collection count changed from expected 612"
          echo "   Expected: 612 tests collected"
          echo "   Actual: $SUMMARY"
          exit 1
        fi
        
        echo "✅ Test collection count stable: 612 tests"

  full-test-suite:
    runs-on: ubuntu-latest
    name: Full Test Suite (Optional)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.12'
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip -c constraints.txt
        pip install -e .

    - name: Install test dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install pytest pytest-asyncio

    - name: Run full test suite
      run: |
        echo "Running full test suite..."
        python -m pytest tests/ --tb=short --junitxml=test-results.xml
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: full-test-results
        path: test-results.xml
