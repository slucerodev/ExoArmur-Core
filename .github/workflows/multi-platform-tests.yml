name: Multi-Platform Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

permissions:
  contents: read
  checks: write
  actions: read

jobs:
  test-matrix:
    name: Test on Python ${{ matrix.python-version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.12.3"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Cache pip dependencies
      uses: actions/cache@v5
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/pyproject.toml', '**/requirements.lock') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip==24.0
        python -m pip install -r requirements.lock
        python -m pip install --no-deps -e .

    - name: Run core tests
      run: |
        pytest -q tests/test_v2_restrained_autonomy.py
        pytest -q tests/test_golden_demo_live.py

    - name: Run CLI health check
      run: |
        exoarmur health

    - name: Verify deterministic behavior
      run: |
        exoarmur verify-all
        echo "✅ VERIFY_ALL: PASSED"

  integration-tests:
    name: Integration Tests - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test-matrix
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12.3'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip==24.0
        python -m pip install -r requirements.lock
        python -m pip install --no-deps -e .

    - name: Run API integration tests
      run: |
        pytest -q tests/test_api_integration.py -v || echo "API integration tests not yet implemented"

    - name: Test plugin discovery
      run: |
        python -c "from exoarmur.plugins.registry import PluginRegistry; registry = PluginRegistry(); providers = registry.discover_providers(); print(f'Plugin discovery works: {len(providers)} providers found')"

  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: test-matrix

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12.3'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip==24.0
        python -m pip install -r requirements.lock
        python -m pip install --no-deps -e .

    - name: Run performance benchmarks
      run: |
        pytest -q tests/test_performance.py --benchmark-only || echo "Performance tests not yet implemented"

  build-and-package:
    name: Build & Package Test - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: test-matrix
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up Python 3.12
      uses: actions/setup-python@v6
      with:
        python-version: '3.12.3'

    - name: Build package
      run: |
        python -m pip install --upgrade pip==24.0
        python -m pip install -r requirements.lock
        python -m pip install --no-deps -e .
        python -m build

    - name: Test package installation
      run: |
        python -m pip install dist/*.whl
        python -c "import exoarmur; print(f'ExoArmur version: {exoarmur.__version__}')"

    - name: Test editable installation
      run: |
        python -m pip install --no-deps -e .
        exoarmur --help

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-${{ matrix.os }}
        path: dist/
        retention-days: 7
