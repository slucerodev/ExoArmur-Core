version: '3.8'

services:
  exoarmur-demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exoarmur-demo
    ports:
      - "8080:8080"
    environment:
      - PYTHONHASHSEED=0
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.exoarmur-demo.rule=Host(`localhost`)"
      - "traefik.http.services.exoarmur-demo.loadbalancer.server.port=8080"
      - "org.exoarmur.name=ExoArmur Deterministic Governance Demo"
      - "org.exoarmur.version=1.0.0"
      - "org.exoarmur.determinism=enforced"

networks:
  default:
    name: exoarmur-demo-network
