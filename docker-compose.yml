services:
  nats:
    image: nats:2.10-alpine
    container_name: exoarmur-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-js", "-m", "8222"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8222/varz"]
      interval: 10s
      timeout: 5s
      retries: 5

  exoarmur-demo:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: exoarmur-demo
    ports:
      - "8080:8080"
    environment:
      - PYTHONHASHSEED=0
      - PYTHONUNBUFFERED=1
      - PYTHONDONTWRITEBYTECODE=1
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.exoarmur-demo.rule=Host(`localhost`)"
      - "traefik.http.services.exoarmur-demo.loadbalancer.server.port=8080"
      - "org.exoarmur.name=ExoArmur Deterministic Governance Demo"
      - "org.exoarmur.version=1.0.0"
      - "org.exoarmur.determinism=enforced"

networks:
  default:
    name: exoarmur-demo-network
